<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Mis Tareas - Gestor</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Botones generales */
        button { cursor: pointer; border: none; border-radius: 4px; padding: 8px 15px; color: white; font-size: 14px; }
        .btn-logout { background-color: #dc3545; }
        .btn-logout:hover { background-color: #c82333; }
        .btn-add { background-color: #28a745; padding: 10px 20px; }
        .btn-add:hover { background-color: #218838; }

        
        .btn-edit { background-color: #ffc107; color: #000; padding: 6px 12px; margin-left: 10px;}
        .btn-edit:hover { background-color: #e0a800; }
        .task-actions { display: flex; gap: 5px; }

        /* Formulario superior */
        .task-form { display: flex; gap: 10px; margin-bottom: 20px; }
        .task-form input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Lista de tareas */
        .task-list { list-style: none; padding: 0; }
        .task-item { background: #f9f9f9; padding: 15px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .task-info h3 { margin: 0 0 5px 0; font-size: 18px; }
        .task-info p { margin: 0; color: #666; font-size: 14px; }

        /* Estilos del modal*/

        /* --- ESTILOS DEL MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 350px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .modal.active { display: flex; } /* Esta clase hará que aparezca */
        .modal-content input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .modal-buttons button { flex: 1; }
    </style>
    </head>
    <body>
        <div class="container">
        <div class="header">
            <h2>Gestor de Tareas</h2>
            <button id="btnLogout" class="btn-logout">Cerrar Sesión</button>
        </div>

        <form id="taskForm" class="task-form">
            <input type="text" id="taskTitle" placeholder="Nueva tarea..." required>
            <input type="text" id="taskDesc" placeholder="Descripción (opcional)">
            <button type="submit" class="btn-add">Agregar</button>
        </form>

        <ul id="taskList" class="task-list">
            <li class="task-item">
                <div class="task-info">
                    <h3>Cargando tus tareas...</h3>
                    <p>Conectando con la base de datos.</p>
                </div>
            </li>
        </ul>
    </div>

    <div id="editModal" class="modal">
            <div class="modal-content">
                <h3>Editar Tarea</h3>
                <input type="hidden" id="editTaskId"> <input type="text" id="editTaskTitle" placeholder="Nuevo título">
                <input type="text" id="editTaskDesc" placeholder="Nueva descripción">
                <div class="modal-buttons">
                    <button id="btnSaveEdit" class="btn-add">Guardar</button>
                    <button id="btnCancelEdit" class="btn-logout">Cancelar</button>
                </div>
            </div>
        </div>

        <div id="deleteModal" class="modal">
            <div class="modal-content">
                <h3>¿Eliminar Tarea?</h3>
                <p>¿Estás seguro de que quieres borrar esta tarea? Esta acción no se puede deshacer.</p>
                <input type="hidden" id="deleteTaskId"> <div class="modal-buttons">
                    <button id="btnConfirmDelete" class="btn-logout">Sí, eliminar</button>
                    <button id="btnCancelDelete" style="background-color: #6c757d; color: white;">Cancelar</button>
                </div>
            </div>
        </div>
        
        
       
        
        <script>
            
            const token = localStorage.getItem("token");

            if(!token){
                alert("Acceso denegado, por favor inicia sesión.");
                window.location.href = "index.html";
            }

            
            const btnLogout = document.getElementById("btnLogout");
            btnLogout.addEventListener("click", () =>{
                localStorage.removeItem("token");
                window.location.href = "index.html";
            });

          
            const taskList = document.getElementById("taskList");
            const cargarTareas = async () =>{
                try{
                    const response = await fetch ('http://localhost:3000/api/task', {
                        method: "GET",
                        headers: {
                            "authorization": `Bearer ${token}`
                        }
                    });

                    const data = await response.json();

                    if (response.ok){
                        taskList.innerHTML="";

                        if (data.tasks.length === 0){
                            taskList.innerHTML = '<li class="task-item"><p>No tienes tareas pendientes. ¡Agrega una arriba!</p></li>';
                            return;
                        }

                        data.tasks.forEach(tarea => {
                            const li = document.createElement("li");
                            li.className = "task-item";
                           li.innerHTML = `
                                <div class="task-info">
                                        <h3>${tarea.title}</h3>
                                        <p>${tarea.description || 'Sin descripción'}</p>
                                </div>
                    
                                <div class="task-actions">
                                    <button class="btn-edit" onclick="editarTarea(${tarea.id}, '${tarea.title}', '${tarea.description || ''}')">Editar</button>
                                    <button class="btn-logout" onclick="eliminarTarea(${tarea.id})">Borrar</button>
                                </div>
                            `;
                            taskList.appendChild(li);
                        });
                    }else{
                       taskList.innerHTML = `<li class="task-item"><p style="color:red;">Error: ${data.message}</p></li>`;
                    }
                }catch(error){
                    console.error("Error de conexión:", error);
                    taskList.innerHTML = '<li class="task-item"><p style="color:red;">Error al conectar con la base de datos.</p></li>';
                } 
            }; 

            cargarTareas();

            const editModal = document.getElementById("editModal")
            const editTaskId = document.getElementById("editTaskId")
            const editTaskTitle = document.getElementById("editTaskTitle")
            const editTaskDesc = document.getElementById("editTaskDesc")

            const editarTarea = (id,tituloActual,descActual) =>{
                editTaskId.value=id 
                editTaskTitle.value = tituloActual
                editTaskDesc.value = descActual === 'undefined' ? "": descActual

                editModal.classList.add("active")
            }

            document.getElementById("btnCancelEdit").addEventListener("click", () => {
                editModal.classList.remove("active")
            })

            document.getElementById("btnSaveEdit").addEventListener("click", async() =>{

                const id = editTaskId.value
                const nuevoTitulo = editTaskTitle.value
                const nuevaDesc = editTaskDesc.value

                if (!nuevoTitulo){
                    alert ("El titulo no puede estar Vacio")
                    return
                }

                try{

                    const response = await fetch (`http://localhost:3000/api/task/${id}`,{
                        method: "PUT",
                        headers:{
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },

                        body: JSON.stringify({title: nuevoTitulo,description:nuevaDesc})

                    })
                    if (response.ok){
                        editModal.classList.remove("active")
                        cargarTareas()
                    }else{
                        const data = await response.json()
                        alert ("Error al actualizar: " + data.message)
                    }

                }catch(error){
                    console.error("Error al editar: ", error)
                    alert ("Error de conexión alintentar actualizar")

                }
            })

            const deleteModal = document.getElementById("deleteModal")
            const deleteTaskId = document.getElementById("deleteTaskId")

            const eliminarTarea = (id) =>{
                deleteTaskId.value = id
                deleteModal.classList.add("active")


            };

            document.getElementById("btnCancelDelete").addEventListener("click",() =>{
                deleteModal.classList.remove("active")
            })

            document.getElementById("btnConfirmDelete").addEventListener("click",async () => {
                const id = deleteTaskId.value


                try{

                    const response = await fetch (`http://localhost:3000/api/task/${id}`,{
                        method : "DELETE",
                        headers:{
                            "Authorization": `Bearer ${token}`
                        }
                    })

                    if (response.ok){
                        deleteModal.classList.remove("active")
                        cargarTareas()
                    }else{
                        const data = await response.json()
                        alert("Error al eliminar: " +  data.message)
            
                    }


                }catch(error){
                    console.error("Error al eliminar: ", error)
                    alert("Error de conexion al intentar borrar.")

                }
            })








            const taskForm = document.getElementById("taskForm");
            
            taskForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const title = document.getElementById("taskTitle").value;
                const description = document.getElementById("taskDesc").value;

                try{
                    const response = await fetch ("http://localhost:3000/api/task",{
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        body: JSON.stringify({title,description})
                    });

                    if (response.ok){
                        document.getElementById("taskTitle").value = "";
                        document.getElementById("taskDesc").value = "";

                        cargarTareas();
                    }else{
                        const data = await response.json();
                        alert("Error al guardar: " + data.message);
                    }

                }catch(error){
                    console.error("Error al crear la tarea: ", error);
                    alert("Error de conexion al intentar guardar la tarea");
                }
            }); 
           
        </script>
    </body>
</html>
